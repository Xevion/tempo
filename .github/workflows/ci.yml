name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  checks: write

jobs:
  ci:
    name: Summary
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Type Check
        id: typecheck
        run: bunx tsc --noEmit
        continue-on-error: true

      - name: Lint
        id: lint
        run: bunx biome check src/
        continue-on-error: true

      - name: Tests
        id: test
        run: bun test
        continue-on-error: true

      - name: Pack Dry Run
        id: pack
        run: npm pack --dry-run
        continue-on-error: true

      - name: Publint
        id: publint
        run: bunx publint --strict
        continue-on-error: true

      - name: Are The Types Wrong
        id: attw
        run: bunx @arethetypeswrong/cli --pack .
        continue-on-error: true

      - name: Report check statuses
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const checks = [
              { name: 'Type Check', outcome: '${{ steps.typecheck.outcome }}' },
              { name: 'Lint', outcome: '${{ steps.lint.outcome }}' },
              { name: 'Tests', outcome: '${{ steps.test.outcome }}' },
              { name: 'Pack Dry Run', outcome: '${{ steps.pack.outcome }}' },
              { name: 'Publint', outcome: '${{ steps.publint.outcome }}' },
              { name: 'Are The Types Wrong', outcome: '${{ steps.attw.outcome }}' },
            ];
            for (const check of checks) {
              await github.rest.checks.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                head_sha: context.sha,
                name: check.name,
                conclusion: check.outcome === 'success' ? 'success' : 'failure',
                status: 'completed',
              });
            }

      - name: Fail if any check failed
        if: always()
        run: |
          outcomes=("${{ steps.typecheck.outcome }}" "${{ steps.lint.outcome }}" "${{ steps.test.outcome }}" "${{ steps.pack.outcome }}" "${{ steps.publint.outcome }}" "${{ steps.attw.outcome }}")
          for outcome in "${outcomes[@]}"; do
            if [ "$outcome" != "success" ]; then
              echo "One or more checks failed"
              exit 1
            fi
          done
