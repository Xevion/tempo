name: Release

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions: {}

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4.4.1 # zizmor: ignore[unpinned-uses]
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }} # zizmor: ignore[secrets-outside-env]
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

  publish:
    name: Publish to npm
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6 # zizmor: ignore[unpinned-uses]
        with:
          persist-credentials: false

      - uses: oven-sh/setup-bun@v2 # zizmor: ignore[unpinned-uses]
        with:
          bun-version: latest

      - uses: actions/setup-node@v6 # zizmor: ignore[unpinned-uses]
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org

      - run: bun install --frozen-lockfile

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }} # zizmor: ignore[secrets-outside-env]
